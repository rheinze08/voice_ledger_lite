name: Build Android APK

on:
  push:
    branches:
      - main
    paths:
      - "app/**"
      - "build.gradle.kts"
      - "settings.gradle.kts"
      - "gradle.properties"
      - ".github/workflows/android-apk.yml"
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      publish_release:
        description: "Create or update a GitHub release with the built APK"
        required: true
        type: boolean
        default: true
      tag_name:
        description: "Release tag to create or update when manually publishing"
        required: false
        type: string
        default: "v0.1.0"

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses >/dev/null

      - name: Install Android platform packages
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0" "platform-tools"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.13"

      - name: Build debug APK
        run: gradle :app:assembleDebug

      - name: Rename APK for distribution
        run: cp app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/ledger-lite-debug.apk

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ledger-lite-debug-apk
          path: app/build/outputs/apk/debug/ledger-lite-debug.apk
          retention-days: 14

      - name: Upload APK to published release
        if: github.event_name == 'release'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            app/build/outputs/apk/debug/ledger-lite-debug.apk#ledger-lite-debug.apk \
            --clobber

      - name: Create or update release from manual run
        if: github.event_name == 'workflow_dispatch' && inputs.publish_release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ inputs.tag_name }}
          APK_PATH: app/build/outputs/apk/debug/ledger-lite-debug.apk
        run: |
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" "$APK_PATH#ledger-lite-debug.apk" --clobber
          else
            gh release create "$TAG_NAME" "$APK_PATH#ledger-lite-debug.apk" \
              --title "Ledger Lite $TAG_NAME" \
              --notes "Debug APK built from GitHub Actions for quick installation and testing."
          fi
